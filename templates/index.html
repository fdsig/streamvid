<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        img {
            width: 320px;
            height: 240px;
            border: 2px solid black;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <img src="/video_feed" alt="Video Feed">
    
    <div class="btn-container">
        <button onclick="sendAction('start')">Start Stream</button>
        <button onclick="sendAction('pause')">Pause Stream</button>
        <button onclick="sendAction('resume')">Resume Stream</button>
        <button onclick="sendAction('stop')">Stop Stream</button>
        <button onclick="sendAction('save_image')">Save Image</button>
    </div>

    <script>
        function sendAction(actionType) {
            fetch('/action', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: actionType })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status !== "success") {
                    alert("Action failed.");
                }
            })
            .catch(error => {
                console.error("There was an error with the fetch operation:", error);
            });
        }
    </script>
</body>
</html>
