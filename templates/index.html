<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream</title>
    <style>
        /* ... [Your previous CSS here] ... */
    </style>
    <script>
        function sendRequest(endpoint, message) {
            fetch(endpoint)
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    alert(message);
                } else {
                    alert("An error occurred.");
                }
            })
            .catch(error => {
                console.error("There was an error!", error);
            });
        }
    </script>
</head>
<body>
    <img src="/video_feed" alt="Video Feed">
    <div class="btn-container">
        <button onclick="sendRequest('/start', 'Stream started')">Start Stream</button>
        <button onclick="sendRequest('/pause', 'Stream paused')">Pause Stream</button>
        <button onclick="sendRequest('/resume', 'Stream resumed')">Resume Stream</button>
        <button onclick="sendRequest('/stop', 'Stream stopped')">Stop Stream</button>
        <button onclick="sendRequest('/save_image', 'Image saved')">Save Image</button>
    </div>
</body>
</html>
